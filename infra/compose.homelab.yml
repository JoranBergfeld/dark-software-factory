# compose.homelab.yml
# Homelab deployment for the Grafana source agent (design §8: homelab agents run
# the same image on Proxmox, A2A-reachable via an OUTBOUND tunnel — no inbound
# ports). The cloud orchestrator reaches this agent's A2A endpoint through the
# tunnel; nothing is exposed to the public internet directly.
#
# Usage:
#   1. Copy infra/.env.homelab.example -> infra/.env.homelab and fill it in.
#   2. docker compose -f infra/compose.homelab.yml --env-file infra/.env.homelab up -d
#
# Two services:
#   grafana-agent : the DSF Grafana source agent (FastAPI A2A endpoint on :8080)
#   tunnel        : an egress-only tunnel sidecar that publishes the agent's
#                   A2A endpoint to the cloud control plane.

services:
  grafana-agent:
    # Built from the existing agent Dockerfile. Build context is the REPO ROOT
    # so `pip install -e .` resolves the dsf package.
    build:
      context: ..
      dockerfile: src/dsf/agents/grafana/Dockerfile
    image: dsf/agent-grafana:local
    container_name: dsf-grafana-agent
    restart: unless-stopped
    environment:
      DSF_MODE: azure
      # A2A bearer token the cloud orchestrator must present to call this agent.
      A2A_BEARER_TOKEN: ${A2A_BEARER_TOKEN}
      # Cloud platform endpoints (read-only/outbound use from the homelab).
      AZURE_APPCONFIG_ENDPOINT: ${AZURE_APPCONFIG_ENDPOINT}
      AZURE_KEYVAULT_URI: ${AZURE_KEYVAULT_URI}
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
      # Local Grafana the agent queries for metric/log anomalies.
      GRAFANA_URL: ${GRAFANA_URL}
      GRAFANA_TOKEN: ${GRAFANA_TOKEN}
    # No published ports: the agent is reached ONLY via the tunnel sidecar on
    # the shared docker network. (Uncomment to debug locally on the LAN.)
    # ports:
    #   - "8080:8080"
    expose:
      - "8080"
    networks:
      - dsf

  # -------------------------------------------------------------------------
  # Tunnel sidecar. Pick ONE option and configure it; both are egress-only.
  # -------------------------------------------------------------------------
  #
  # OPTION A — Cloudflare Tunnel (cloudflared), shown active below.
  #   1. Create a tunnel:  cloudflared tunnel create dsf-grafana
  #   2. Map a hostname (e.g. grafana-agent.example.com) -> http://grafana-agent:8080
  #   3. Put the tunnel token in TUNNEL_TOKEN in .env.homelab.
  #   The cloud orchestrator's Product Registry points the Grafana agent
  #   endpoint at https://grafana-agent.example.com (still bearer-authenticated).
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: dsf-grafana-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - grafana-agent
    networks:
      - dsf

  # OPTION B — Tailscale sidecar (alternative to cloudflared above).
  #   Comment out the cloudflared `tunnel` service and uncomment this one.
  #   Generate an auth key at https://login.tailscale.com/admin/settings/keys
  #   and set TS_AUTHKEY in .env.homelab. The agent becomes reachable on the
  #   tailnet at http://dsf-grafana-tunnel:8080 (orchestrator joins the tailnet).
  # tunnel:
  #   image: tailscale/tailscale:latest
  #   container_name: dsf-grafana-tunnel
  #   restart: unless-stopped
  #   hostname: dsf-grafana-tunnel
  #   environment:
  #     TS_AUTHKEY: ${TS_AUTHKEY}
  #     TS_EXTRA_ARGS: --advertise-tags=tag:dsf-agent
  #     TS_STATE_DIR: /var/lib/tailscale
  #   volumes:
  #     - tailscale-state:/var/lib/tailscale
  #   cap_add:
  #     - NET_ADMIN
  #     - NET_RAW
  #   depends_on:
  #     - grafana-agent
  #   networks:
  #     - dsf

networks:
  dsf:
    driver: bridge

