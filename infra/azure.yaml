# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
#
# azd project manifest for the Dark Software Factory.
#
# This provisions the Azure backing services AND the runtime (infra/main.bicep) —
# a Container Apps environment + orchestrator app on a user-assigned managed identity.
# There is intentionally no `services:` block: the Container App is authored directly
# in Bicep, so use `azd provision` (not `azd up`). See ADR 0004.
#
# NOTE: This authors the infrastructure. It is NOT run autonomously — see
# infra/README.md for the human-gated provisioning steps.

name: dark-software-factory
metadata:
  template: dark-software-factory@0.1.0

infra:
  provider: bicep
  path: .
  module: main
