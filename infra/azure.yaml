# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
#
# azd project manifest for the Dark Software Factory.
#
# This provisions ONLY the Azure backing services (infra/main.bicep). It does NOT
# build or deploy any container/compute — the agent + orchestrator runtime is
# hosted by the user (e.g. a Proxmox homelab) and reaches these services outbound.
# There is intentionally no `services:` block. Use `azd provision` (not `azd up`).
#
# NOTE: This authors the infrastructure. It is NOT run autonomously — see
# infra/README.md for the human-gated provisioning steps.

name: dark-software-factory
metadata:
  template: dark-software-factory@0.1.0

infra:
  provider: bicep
  path: .
  module: main
