name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv venv --python 3.12
      - name: Install
        run: uv pip install -e ".[dev]"
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest -q
      - name: Evals gate
        run: uv run python -m dsf.evals.runner --gate
