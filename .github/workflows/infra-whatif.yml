name: infra-whatif

# Validate the Azure backing-services deployment on every change to infra/.
# `lint` always runs (compiles the Bicep, no Azure auth needed). `what-if` runs a
# real preview against your resource group via OIDC — it activates automatically
# once the AZURE_* repo variables are set (see infra/README.md). Nothing deploys.

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-whatif.yml'
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/infra-whatif.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Compile Bicep (lint)
        run: az bicep build --file infra/main.bicep

  what-if:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    # Activates only once OIDC repo variables are configured.
    if: ${{ vars.AZURE_CLIENT_ID != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: What-if deployment preview
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group what-if \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --template-file infra/main.bicep \
              --parameters @infra/main.parameters.json
