# Dark Software Factory — virtual workspace root.
#
# This file defines the uv workspace and shared tooling config only; it ships no
# package of its own. Every runtime lives in a self-contained member under
# core/, feature-council/, cli/, and control-center/ (all sharing the one
# PEP 420 ``dsf`` namespace). Install everything with ``uv sync --all-packages``.

[tool.uv.workspace]
members = ["core", "feature-council", "cli", "control-center"]

[tool.uv.sources]
dsf-core = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "import-linter>=2.0",
]
docs = ["mkdocs-material>=9.5"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.isort]
known-first-party = ["dsf", "dsf_testing"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
# Each member owns its tests under <member>/tests/. Because every member's test
# root is named `tests`, prepend/append import modes would collide on the package
# name (and on duplicate test-file basenames). importlib mode + namespace-package
# awareness import each test module by path with no shared `tests` package.
# Shared, dependency-light doubles/builders live in `testing/dsf_testing` (on the
# path below) so any member's tests can `from dsf_testing import ...`.
addopts = "--import-mode=importlib"
consider_namespace_packages = true
pythonpath = ["testing"]
testpaths = [
    "core/tests",
    "feature-council/tests",
    "cli/tests",
    "control-center/tests",
]

# Architectural boundaries between workspace members (enforced in CI via
# `uv run lint-imports`). All members share the one `dsf` namespace, so the
# contracts are expressed over top-level `dsf.*` subpackages:
#   - core (a2a, config, container, contracts, github_client, learning, memory,
#     model, observability, ports) is the shared base and must not import any
#     application member.
#   - the three application members (cli, feature-council, control-center) may
#     import core but must not import each other.
[tool.importlinter]
root_package = "dsf"

[[tool.importlinter.contracts]]
name = "core must not import application members"
type = "forbidden"
source_modules = [
    "dsf.a2a",
    "dsf.config",
    "dsf.container",
    "dsf.contracts",
    "dsf.github_client",
    "dsf.learning",
    "dsf.memory",
    "dsf.model",
    "dsf.observability",
    "dsf.ports",
]
forbidden_modules = [
    "dsf.agents",
    "dsf.council",
    "dsf.orchestrator",
    "dsf.triggers",
    "dsf.evals",
    "dsf.runtime",
    "dsf.cli",
    "dsf.instance",
    "dsf.control_center",
]

[[tool.importlinter.contracts]]
name = "cli must not import other application members"
type = "forbidden"
source_modules = [
    "dsf.cli",
    "dsf.instance",
]
forbidden_modules = [
    "dsf.agents",
    "dsf.council",
    "dsf.orchestrator",
    "dsf.triggers",
    "dsf.evals",
    "dsf.runtime",
    "dsf.control_center",
]

[[tool.importlinter.contracts]]
name = "feature-council must not import other application members"
type = "forbidden"
source_modules = [
    "dsf.agents",
    "dsf.council",
    "dsf.orchestrator",
    "dsf.triggers",
    "dsf.evals",
    "dsf.runtime",
]
forbidden_modules = [
    "dsf.cli",
    "dsf.instance",
    "dsf.control_center",
]

[[tool.importlinter.contracts]]
name = "control-center must not import other application members"
type = "forbidden"
source_modules = [
    "dsf.control_center",
]
forbidden_modules = [
    "dsf.agents",
    "dsf.council",
    "dsf.orchestrator",
    "dsf.triggers",
    "dsf.evals",
    "dsf.runtime",
    "dsf.cli",
    "dsf.instance",
]
